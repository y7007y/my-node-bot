name: Auto Update Nodes

on:
  schedule:
    - cron: '0 0 * * *' # 每天北京时间上午 8:00
  workflow_dispatch:     # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    # 给予 Actions 写入仓库的权限（非常重要）
    permissions:
      contents: write
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          # 取消默认的浅克隆，获取完整历史以方便合并
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: 1. 配置 Git 信息并同步远程仓库
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          # 在运行脚本前先拉取，确保本地是最新的，避免冲突
          git pull origin main --rebase

      - name: 2. 运行 Python 脚本
        env:
          MY_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python main.py

      - name: 3. 提交并推送更改
        run: |
          git add README.md
          # 检查是否有文件变动
          if git diff --staged --quiet; then
            echo "没有发现新节点，无需更新 README。"
          else
            git commit -m "自动更新节点汇总: $(date +'%Y-%m-%d %H:%M')"
            # 使用 --force-with-lease 比直接 force 更安全
            git push origin main
          fi
